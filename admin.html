<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - D2CHATPRO</title>
<link rel="icon" type="image/webp" href="https://images.dualite.app/d52f60de-2692-4885-8c36-cb03ccdd56d7/a6c733d4-5b54-4b8d-8673-389cce8d164a-f55ea176-d0e1-4ae6-81ae-63a18d77da88.webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #000000;
    --white: #ffffff;
    --yellow: #fdc616;
    --gray-900: #0a0a0a;
    --gray-800: #111111;
    --gray-700: #1a1a1a;
    --gray-400: #555555;
    --gray-300: #888888;
    --gray-200: #aaaaaa;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
  }
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: -1; opacity: 0.3;
  }

  .container {
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* LOGIN SCREEN */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    height: 100vh;
  }
  .login-box {
    background: var(--gray-900);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }
  .login-box img { height: 45px; margin-bottom: 24px; }
  .login-box h2 { font-family: 'Syne', sans-serif; margin-bottom: 24px; font-size: 1.5rem; }
  
  .input-field {
    width: 100%;
    background: var(--gray-800);
    border: 1px solid var(--glass-border);
    color: var(--white);
    padding: 14px 16px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .input-field:focus { border-color: var(--yellow); }
  
  .btn {
    background: var(--yellow);
    color: var(--black);
    border: none;
    padding: 14px 24px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    width: 100%;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(253,198,22,0.2); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

  /* DASHBOARD SCREEN */
  .dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
    border-bottom: 1px solid var(--glass-border);
    padding-bottom: 24px;
  }
  .dashboard-title {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .dashboard-title img { height: 40px; }
  .dashboard-title h1 { font-family: 'Syne', sans-serif; font-size: 1.5rem; margin: 0; }
  
  .stats-badge {
    background: var(--yellow-dim);
    border: 1px solid rgba(253,198,22,0.25);
    color: var(--yellow);
    padding: 8px 20px;
    border-radius: 100px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
  }

  .actions-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .btn-secondary {
    background: var(--gray-800);
    color: var(--white);
    border: 1px solid var(--glass-border);
    width: auto;
  }
  .btn-secondary:hover { background: var(--gray-700); border-color: rgba(255,255,255,0.2); }
  .btn-danger {
    background: rgba(255,80,80,0.1);
    color: #ff6060;
    border: 1px solid rgba(255,80,80,0.3);
    width: auto;
  }
  .btn-danger:hover { background: rgba(255,80,80,0.2); }

  /* TABLE */
  .table-container {
    background: var(--gray-900);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
  }
  th, td {
    padding: 16px 20px;
    border-bottom: 1px solid var(--glass-border);
    white-space: nowrap;
  }
  th {
    background: var(--gray-800);
    font-family: 'Syne', sans-serif;
    color: var(--gray-300);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--glass); }
  
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-400);
    font-size: 1.1rem;
  }
</style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <div class="login-box">
      <img src="https://images.dualite.app/d52f60de-2692-4885-8c36-cb03ccdd56d7/logo-616133b2-f8dd-44e4-81b1-c8e04bc68628.webp" alt="D2ChatPro Logo">
      <h2>Acesso Restrito</h2>
      <form id="loginForm">
        <input type="password" id="adminPassword" class="input-field" placeholder="Digite a senha de acesso" required>
        <button type="submit" class="btn">Acessar Painel</button>
      </form>
    </div>
  </div>

  <!-- DASHBOARD SCREEN -->
  <div id="dashboardScreen" class="container" style="display: none;">
    <div class="dashboard-header">
      <div class="dashboard-title">
        <img src="https://images.dualite.app/d52f60de-2692-4885-8c36-cb03ccdd56d7/logo-616133b2-f8dd-44e4-81b1-c8e04bc68628.webp" alt="Logo">
        <h1>Painel de Cadastros</h1>
      </div>
      <div class="stats-badge">Total: <span id="totalCount">0</span></div>
    </div>
    
    <div class="actions-bar">
      <button id="btnExport" class="btn btn-secondary">📥 Exportar Excel</button>
      <button id="btnClear" class="btn btn-danger">🗑️ Zerar Lista</button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Nome Completo</th>
            <th>E-mail</th>
            <th>WhatsApp</th>
            <th>Data do Cadastro</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Data will be injected here -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script>
    // SUPABASE CONFIGURATION
    const supabaseUrl = 'https://pixbvjvqfvftflqbbdfz.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpeGJ2anZxZnZmdGZscWJiZGZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDExNDYsImV4cCI6MjA5MzQ3NzE0Nn0.hdRzN7ViO94yTRh6UGFWq7zd1wRuYE9JtnD2ZqrKxks';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    let allData = [];

    // LOGIN LOGIC
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const pwd = document.getElementById('adminPassword').value;
      if (pwd === 'd2admin2025') {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboardScreen').style.display = 'block';
        fetchData();
      } else {
        alert('Senha incorreta! Acesso negado.');
      }
    });

    // FETCH DATA FROM SUPABASE
    async function fetchData() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '<tr><td colspan="4" class="empty-state">Carregando dados...</td></tr>';
      
      const { data, error } = await supabaseClient
        .from('cadastros')
        .select('*')
        .order('criado_em', { ascending: false });

      if (error) {
        console.error(error);
        tbody.innerHTML = '<tr><td colspan="4" class="empty-state" style="color: #ff6060;">Erro ao carregar dados do banco.</td></tr>';
        return;
      }

      allData = data;
      document.getElementById('totalCount').textContent = data.length;

      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-state">Nenhum cadastro encontrado até o momento.</td></tr>';
        return;
      }

      tbody.innerHTML = data.map(row => {
        const dateObj = new Date(row.criado_em);
        const formattedDate = dateObj.toLocaleDateString('pt-BR') + ' às ' + dateObj.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        
        return `
          <tr>
            <td style="font-weight: 500; color: var(--white);">${row.nome}</td>
            <td style="color: var(--gray-200);">${row.email}</td>
            <td style="color: var(--gray-200);">${row.whatsapp}</td>
            <td style="color: var(--gray-400); font-size: 0.9rem;">${formattedDate}</td>
          </tr>
        `;
      }).join('');
    }

    // EXPORT TO EXCEL (SHEETJS)
    document.getElementById('btnExport').addEventListener('click', () => {
      if (allData.length === 0) {
        return alert('Não há dados para exportar no momento.');
      }
      
      // Format data for Excel
      const exportData = allData.map(row => {
        const dateObj = new Date(row.criado_em);
        return {
          'Nome Completo': row.nome,
          'E-mail': row.email,
          'WhatsApp': row.whatsapp,
          'Data de Cadastro': dateObj.toLocaleDateString('pt-BR'),
          'Hora': dateObj.toLocaleTimeString('pt-BR')
        };
      });

      const ws = XLSX.utils.json_to_sheet(exportData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Cadastros");
      
      // Trigger download
      XLSX.writeFile(wb, "D2CHATPRO_Leads.xlsx");
    });

    // CLEAR LIST
    document.getElementById('btnClear').addEventListener('click', async () => {
      if (allData.length === 0) {
        return alert('A lista já está vazia.');
      }
      
      const confirmDelete = confirm('⚠️ ATENÇÃO: Tem certeza que deseja apagar TODOS os cadastros?\n\nEsta ação é irreversível e apagará os dados permanentemente do banco de dados.');
      
      if (confirmDelete) {
        const btn = document.getElementById('btnClear');
        btn.textContent = 'Apagando...';
        btn.disabled = true;

        // In Supabase JS, to delete all rows you must provide a filter that matches everything.
        // .not('id', 'is', null) safely matches all valid UUIDs.
        const { error } = await supabaseClient
          .from('cadastros')
          .delete()
          .not('id', 'is', null);

        btn.textContent = '🗑️ Zerar Lista';
        btn.disabled = false;

        if (error) {
          console.error(error);
          alert('Erro ao tentar apagar os dados. Verifique o console.');
        } else {
          alert('Todos os cadastros foram apagados com sucesso!');
          fetchData(); // Refresh table (will be empty)
        }
      }
    });
  </script>
</body>
</html>
